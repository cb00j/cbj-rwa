[profile.default]
src = "src"
out = "out"
script = "script"
libs = ["lib"]

solc = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 200

fs_permissions = [
    { access = "write", path = "./deployments" },
    { access = "read", path = "./deployments" },
]

[invariant]
fail_on_revert = true

[rpc_endpoints]
local = "http://127.0.0.1:8545"
sepolia = "https://1rpc.io/sepolia"

[lint]
exclude_lints = ["asm-keccak256", "mixed-case-variable", "mixed-case-function"]
